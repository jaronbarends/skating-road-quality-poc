<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkateMap — Road Surface Ratings</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      :root {
        --bg: #0d0f14;
        --surface: #161920;
        --surface2: #1e2229;
        --border: #2a2f3a;
        --text: #e8eaf0;
        --text-muted: #6b7280;
        --accent: #7efff5;
        --accent2: #ff6b6b;

        --r1: #ff3b3b;
        --r2: #ff8c00;
        --r3: #f5d800;
        --r4: #a3e635;
        --r5: #22c55e;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "DM Mono", monospace;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── HEADER ── */
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 20px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        z-index: 1000;
        flex-shrink: 0;
      }

      .logo {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        color: var(--accent);
      }
      .logo span {
        color: var(--text-muted);
        font-weight: 400;
      }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }

      .mode-toggle {
        display: flex;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
      }

      .mode-btn {
        padding: 7px 16px;
        font-family: "DM Mono", monospace;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        transition: all 0.15s;
        text-transform: uppercase;
      }
      .mode-btn.active {
        background: var(--accent);
        color: var(--bg);
      }

      .btn-icon {
        width: 34px;
        height: 34px;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text-muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s;
        font-size: 1rem;
      }
      .btn-icon:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ── LAYOUT ── */
      .app-body {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #map {
        flex: 1;
        z-index: 1;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 280px;
        background: var(--surface);
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 100;
        overflow: hidden;
      }

      .sidebar-section {
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }

      .sidebar-label {
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 10px;
      }

      /* Rating legend */
      .legend-items {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        padding: 4px 6px;
        border-radius: 6px;
        transition: background 0.1s;
      }
      .legend-item:hover {
        background: var(--surface2);
      }
      .legend-item.filtered {
        opacity: 0.35;
      }

      .legend-dot {
        width: 28px;
        height: 6px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .legend-stars {
        font-size: 0.8rem;
        color: var(--text);
        letter-spacing: -0.02em;
      }
      .legend-label {
        font-size: 0.72rem;
        color: var(--text-muted);
        margin-left: auto;
      }

      /* Segment count badge */
      .count-badge {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 1px 6px;
        font-size: 0.65rem;
        color: var(--text-muted);
        min-width: 22px;
        text-align: center;
      }

      /* Stats */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .stat-box {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px;
      }
      .stat-val {
        font-family: "Syne", sans-serif;
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--accent);
        line-height: 1;
      }
      .stat-key {
        font-size: 0.62rem;
        color: var(--text-muted);
        margin-top: 3px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      /* Segments list */
      .segments-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }
      .segments-list::-webkit-scrollbar {
        width: 4px;
      }
      .segments-list::-webkit-scrollbar-track {
        background: transparent;
      }
      .segments-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .segment-card {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        margin-bottom: 6px;
        cursor: pointer;
        transition: all 0.15s;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .segment-card:hover {
        border-color: var(--accent);
      }
      .segment-card.active {
        border-color: var(--accent);
        background: #1a2220;
      }

      .seg-color-bar {
        width: 4px;
        border-radius: 2px;
        align-self: stretch;
        flex-shrink: 0;
        min-height: 30px;
      }
      .seg-info {
        flex: 1;
        min-width: 0;
      }
      .seg-name {
        font-size: 0.78rem;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .seg-meta {
        font-size: 0.65rem;
        color: var(--text-muted);
        margin-top: 2px;
      }
      .seg-stars {
        font-size: 0.85rem;
      }

      .seg-delete {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 4px;
        border-radius: 4px;
        opacity: 0;
        transition: opacity 0.15s;
        font-size: 0.85rem;
      }
      .segment-card:hover .seg-delete {
        opacity: 1;
      }
      .seg-delete:hover {
        color: var(--accent2);
      }

      /* ── EDIT PANEL ── */
      .edit-panel {
        position: absolute;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 22px;
        width: 380px;
        z-index: 500;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        display: none;
      }
      .edit-panel.visible {
        display: block;
      }

      .edit-title {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 14px;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .edit-step {
        font-size: 0.65rem;
        background: var(--surface2);
        border: 1px solid var(--border);
        padding: 2px 8px;
        border-radius: 20px;
        color: var(--text-muted);
        font-family: "DM Mono", monospace;
        font-weight: 400;
      }

      .edit-hint {
        font-size: 0.73rem;
        color: var(--text-muted);
        margin-bottom: 14px;
        line-height: 1.5;
        padding: 8px 10px;
        background: var(--surface2);
        border-radius: 8px;
        border-left: 2px solid var(--accent);
      }

      .field-label {
        font-size: 0.65rem;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 6px;
      }

      .name-input {
        width: 100%;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 12px;
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 0.82rem;
        outline: none;
        margin-bottom: 14px;
        transition: border-color 0.15s;
      }
      .name-input:focus {
        border-color: var(--accent);
      }

      .star-picker {
        display: flex;
        gap: 8px;
        margin-bottom: 16px;
      }
      .star-opt {
        flex: 1;
        padding: 8px 4px;
        border-radius: 8px;
        border: 1.5px solid var(--border);
        background: var(--surface2);
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        font-size: 0.7rem;
      }
      .star-opt:hover {
        border-color: var(--text-muted);
      }
      .star-opt.selected {
        border-color: currentColor;
      }
      .star-opt[data-r="1"] {
        --c: var(--r1);
      }
      .star-opt[data-r="2"] {
        --c: var(--r2);
      }
      .star-opt[data-r="3"] {
        --c: var(--r3);
      }
      .star-opt[data-r="4"] {
        --c: var(--r4);
      }
      .star-opt[data-r="5"] {
        --c: var(--r5);
      }
      .star-opt.selected {
        background: color-mix(in srgb, var(--c) 15%, transparent);
        border-color: var(--c);
        color: var(--c);
      }
      .star-opt-icon {
        font-size: 1.1rem;
        display: block;
      }
      .star-opt-label {
        font-size: 0.6rem;
        margin-top: 2px;
        color: var(--text-muted);
      }
      .star-opt.selected .star-opt-label {
        color: var(--c);
      }

      .edit-actions {
        display: flex;
        gap: 8px;
      }

      .btn-primary {
        flex: 1;
        padding: 9px;
        border-radius: 8px;
        border: none;
        background: var(--accent);
        color: var(--bg);
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 0.8rem;
        cursor: pointer;
        transition: opacity 0.15s;
        letter-spacing: 0.03em;
      }
      .btn-primary:hover {
        opacity: 0.85;
      }
      .btn-primary:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      .btn-secondary {
        padding: 9px 14px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: none;
        color: var(--text-muted);
        font-family: "DM Mono", monospace;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.15s;
      }
      .btn-secondary:hover {
        border-color: var(--accent2);
        color: var(--accent2);
      }

      /* waypoints counter */
      .waypoint-counter {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .wp-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.4;
      }
      .wp-dot.placed {
        opacity: 1;
      }

      /* Leaflet dark overrides */
      .leaflet-container {
        background: #141519;
      }
      .leaflet-tile {
        filter: brightness(0.85) saturate(0.7);
      }
      .leaflet-control-zoom a {
        background: var(--surface) !important;
        color: var(--text) !important;
        border-color: var(--border) !important;
      }
      .leaflet-control-zoom a:hover {
        background: var(--surface2) !important;
      }
      .leaflet-popup-content-wrapper {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      }
      .leaflet-popup-tip {
        background: var(--surface);
      }
      .leaflet-popup-content {
        font-family: "DM Mono", monospace;
        font-size: 0.8rem;
      }

      /* edit cursor */
      body.edit-mode #map {
        cursor: crosshair;
      }

      /* Temp drawing line */
      .drawing-indicator {
        position: absolute;
        top: 70px;
        left: 50%;
        transform: translateX(-50%);
        background: color-mix(in srgb, var(--accent) 15%, var(--surface));
        border: 1px solid var(--accent);
        border-radius: 20px;
        padding: 5px 14px;
        font-size: 0.7rem;
        color: var(--accent);
        z-index: 400;
        display: none;
        pointer-events: none;
        letter-spacing: 0.05em;
      }
      .drawing-indicator.visible {
        display: block;
      }

      /* No segments empty state */
      .empty-state {
        text-align: center;
        padding: 30px 16px;
        color: var(--text-muted);
        font-size: 0.75rem;
        line-height: 1.7;
      }

      /* responsive */
      @media (max-width: 700px) {
        .sidebar {
          display: none;
        }
        .edit-panel {
          width: calc(100vw - 32px);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">Skate<span>Map</span></div>

      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-view" onclick="setMode('view')">
          View
        </button>
        <button class="mode-btn" id="btn-edit" onclick="setMode('edit')">
          Edit
        </button>
      </div>

      <button
        class="btn-icon"
        title="Center on my location"
        onclick="centerOnMe()"
      >
        ◎
      </button>
    </header>

    <div class="app-body">
      <div id="map"></div>

      <aside class="sidebar">
        <!-- Legend / filter -->
        <div class="sidebar-section">
          <div class="sidebar-label">Surface rating</div>
          <div class="legend-items" id="legend"></div>
        </div>

        <!-- Stats -->
        <div class="sidebar-section">
          <div class="sidebar-label">Overview</div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-val" id="stat-total">0</div>
              <div class="stat-key">Segments</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" id="stat-avg">—</div>
              <div class="stat-key">Avg rating</div>
            </div>
          </div>
        </div>

        <!-- Segments list -->
        <div class="sidebar-label" style="padding: 12px 16px 4px; margin: 0">
          Segments
        </div>
        <div class="segments-list" id="segments-list"></div>
      </aside>
    </div>

    <!-- Edit panel -->
    <div class="edit-panel" id="edit-panel">
      <div class="edit-title">
        <span>➕ Add Segment</span>
        <span class="edit-step" id="edit-step-label">step 1 of 3</span>
      </div>

      <div id="edit-step1">
        <div class="edit-hint">
          Click on the map to place waypoints along the road segment. Click at
          least 2 points, then proceed.
        </div>
        <div class="waypoint-counter" id="waypoint-counter"></div>
        <div class="edit-actions">
          <button
            class="btn-primary"
            id="btn-next-step"
            onclick="goToStep2()"
            disabled
          >
            Next →
          </button>
          <button class="btn-secondary" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>

      <div id="edit-step2" style="display: none">
        <div class="field-label">Segment name (optional)</div>
        <input
          class="name-input"
          id="seg-name-input"
          type="text"
          placeholder="e.g. Stationsweg, Park path..."
        />

        <div class="field-label">Surface quality</div>
        <div class="star-picker" id="star-picker"></div>

        <div class="edit-actions">
          <button
            class="btn-primary"
            id="btn-save"
            onclick="saveSegment()"
            disabled
          >
            Save segment
          </button>
          <button class="btn-secondary" onclick="goToStep1()">← Back</button>
        </div>
      </div>
    </div>

    <div class="drawing-indicator" id="drawing-indicator">
      🛼 Click to place waypoints — min 2 required
    </div>

    <script>
      // Persist & state vars declared early so functions below can reference them
      // (map is assigned after Leaflet loads)
      const RATINGS = [
        { r: 1, color: "#ff3b3b", label: "Terrible", emoji: "💀", weight: 5 },
        { r: 2, color: "#ff8c00", label: "Poor", emoji: "😬", weight: 5 },
        { r: 3, color: "#f5d800", label: "Okay", emoji: "🙂", weight: 5 },
        { r: 4, color: "#a3e635", label: "Good", emoji: "😎", weight: 5 },
        { r: 5, color: "#22c55e", label: "Perfect", emoji: "🔥", weight: 5 },
      ];

      let segments = loadSegments();
      let mode = "view";
      let drawingPoints = [];
      let tempPolyline = null;
      let tempMarkers = [];
      let selectedRating = null;
      let activeSegmentId = null;
      let layerMap = {};
      let filterSet = new Set([1, 2, 3, 4, 5]);
      let map; // assigned once Leaflet is ready

      // ─── Leaflet dynamic loader ─────────────────────────────────────
      (function loadLeaflet() {
        const script = document.createElement("script");
        script.src = "https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
        script.onload = function () {
          // ── Map init ─────────────────────────────────────────────────
          map = L.map("map", { zoomControl: true }).setView([52.06, 5.12], 13);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap contributors",
            maxZoom: 19,
          }).addTo(map);
          map.on("click", onMapClick);
          init();
        };
        script.onerror = function () {
          document.getElementById("map").innerHTML =
            '<div style="color:#ff6b6b;padding:40px;font-family:monospace">Failed to load Leaflet. Check your internet connection.</div>';
        };
        document.head.appendChild(script);
      })();

      // ─── Rendering ─────────────────────────────────────────────────
      function ratingInfo(r) {
        return RATINGS.find((x) => x.r === r);
      }

      function renderAllSegments() {
        // Clear existing
        Object.values(layerMap).forEach((l) => map.removeLayer(l));
        layerMap = {};

        segments.forEach((seg) => {
          const info = ratingInfo(seg.rating);
          if (!filterSet.has(seg.rating)) return;

          const line = L.polyline(seg.points, {
            color: info.color,
            weight: seg.id === activeSegmentId ? 10 : info.weight,
            opacity: 0.85,
            lineCap: "round",
            lineJoin: "round",
          }).addTo(map);

          line.bindPopup(buildPopup(seg));
          line.on("click", () => selectSegment(seg.id));

          layerMap[seg.id] = line;
        });

        renderSidebar();
      }

      function buildPopup(seg) {
        const info = ratingInfo(seg.rating);
        return `
    <div style="min-width:160px">
      <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.95rem;margin-bottom:6px;color:${info.color}">
        ${info.emoji} ${seg.name || "Unnamed segment"}
      </div>
      <div style="color:#9ca3af;font-size:0.7rem;margin-bottom:4px;">${"★".repeat(seg.rating)}${"☆".repeat(5 - seg.rating)} · ${info.label}</div>
      <div style="color:#6b7280;font-size:0.65rem;">${new Date(seg.created).toLocaleDateString()}</div>
      <div style="margin-top:8px;display:flex;gap:6px">
        <button onclick="deleteSegment('${seg.id}')" style="background:none;border:1px solid #374151;border-radius:5px;padding:3px 8px;color:#9ca3af;font-size:0.65rem;cursor:pointer;font-family:'DM Mono',monospace">Delete</button>
      </div>
    </div>`;
      }

      function renderSidebar() {
        // Legend
        const legend = document.getElementById("legend");
        legend.innerHTML = "";
        RATINGS.forEach((info) => {
          const count = segments.filter((s) => s.rating === info.r).length;
          const filtered = !filterSet.has(info.r);
          legend.innerHTML += `
      <div class="legend-item ${filtered ? "filtered" : ""}" onclick="toggleFilter(${info.r})" title="Click to toggle">
        <div class="legend-dot" style="background:${info.color}"></div>
        <div class="legend-stars">${"★".repeat(info.r)}</div>
        <div class="legend-label">${info.label}</div>
        <div class="count-badge">${count}</div>
      </div>`;
        });

        // Stats
        document.getElementById("stat-total").textContent = segments.length;
        const avg = segments.length
          ? (
              segments.reduce((a, s) => a + s.rating, 0) / segments.length
            ).toFixed(1)
          : "—";
        document.getElementById("stat-avg").textContent = avg;

        // Segments list
        const list = document.getElementById("segments-list");
        if (segments.length === 0) {
          list.innerHTML = `<div class="empty-state">No segments yet.<br>Switch to <strong>Edit</strong> mode to add your first road rating.</div>`;
          return;
        }

        list.innerHTML = "";
        [...segments].reverse().forEach((seg) => {
          const info = ratingInfo(seg.rating);
          const card = document.createElement("div");
          card.className = `segment-card ${seg.id === activeSegmentId ? "active" : ""}`;
          card.dataset.id = seg.id;
          card.innerHTML = `
      <div class="seg-color-bar" style="background:${info.color}"></div>
      <div class="seg-info">
        <div class="seg-name">${seg.name || "Unnamed segment"}</div>
        <div class="seg-meta">${"★".repeat(seg.rating)} · ${info.label}</div>
      </div>
      <button class="seg-delete" onclick="deleteSegment('${seg.id}', event)" title="Delete">✕</button>`;
          card.addEventListener("click", () => selectSegment(seg.id));
          list.appendChild(card);
        });
      }

      function selectSegment(id) {
        // Reset previous selection weight
        if (activeSegmentId && layerMap[activeSegmentId]) {
          const prevInfo = ratingInfo(segments.find((s) => s.id === activeSegmentId)?.rating);
          if (prevInfo) layerMap[activeSegmentId].setStyle({ weight: prevInfo.weight });
        }

        activeSegmentId = id;
        const seg = segments.find((s) => s.id === id);
        if (!seg) return;

        // Thicken selected segment
        if (layerMap[id]) {
          layerMap[id].setStyle({ weight: 10 });
        }

        // Pan to center of segment
        const bounds = L.latLngBounds(seg.points);
        map.fitBounds(bounds, { padding: [60, 60], maxZoom: 17 });

        // Open popup
        if (layerMap[id]) {
          layerMap[id].openPopup();
        }

        renderSidebar();
      }

      // ─── Filter ────────────────────────────────────────────────────
      function toggleFilter(r) {
        if (filterSet.has(r)) filterSet.delete(r);
        else filterSet.add(r);
        renderAllSegments();
      }

      // ─── Mode ──────────────────────────────────────────────────────
      function setMode(m) {
        mode = m;
        document
          .getElementById("btn-view")
          .classList.toggle("active", m === "view");
        document
          .getElementById("btn-edit")
          .classList.toggle("active", m === "edit");
        document.body.classList.toggle("edit-mode", m === "edit");

        if (m === "edit") {
          startEditSession();
        } else {
          cancelEdit();
        }
      }

      // ─── Edit flow ─────────────────────────────────────────────────
      function startEditSession() {
        drawingPoints = [];
        routedCoords = [];
        selectedRating = null;
        document.getElementById("edit-panel").classList.add("visible");
        document.getElementById("drawing-indicator").classList.add("visible");
        document.getElementById("edit-step1").style.display = "";
        document.getElementById("edit-step2").style.display = "none";
        document.getElementById("edit-step-label").textContent = "step 1 of 2";
        document.getElementById("seg-name-input").value = "";
        document.getElementById("btn-next-step").disabled = true;
        updateWaypointDots();
        renderStarPicker();
      }

      function cancelEdit() {
        clearDrawing();
        document.getElementById("edit-panel").classList.remove("visible");
        document
          .getElementById("drawing-indicator")
          .classList.remove("visible");
      }

      function goToStep2() {
        document.getElementById("edit-step1").style.display = "none";
        document.getElementById("edit-step2").style.display = "";
        document.getElementById("edit-step-label").textContent = "step 2 of 2";
        document
          .getElementById("drawing-indicator")
          .classList.remove("visible");
      }

      function goToStep1() {
        document.getElementById("edit-step1").style.display = "";
        document.getElementById("edit-step2").style.display = "none";
        document.getElementById("edit-step-label").textContent = "step 1 of 2";
        document.getElementById("drawing-indicator").classList.add("visible");
      }

      // routedCoords holds the full road-snapped coordinate list built up across all segments
      let routedCoords = [];
      let isRouting = false;

      async function onMapClick(e) {
        if (mode !== "edit") return;
        if (document.getElementById("edit-step2").style.display !== "none")
          return;
        if (isRouting) return; // ignore clicks while a request is in flight

        const pt = [e.latlng.lat, e.latlng.lng];
        const prev = drawingPoints[drawingPoints.length - 1];
        drawingPoints.push(pt);

        // Waypoint dot marker
        const m = L.circleMarker(pt, {
          radius: 5,
          color: "#7efff5",
          weight: 2,
          fillColor: "#7efff5",
          fillOpacity: 0.9,
        }).addTo(map);
        tempMarkers.push(m);

        if (prev) {
          // Route from previous waypoint to this one via OSRM
          setRoutingBusy(true);
          try {
            const coords = await fetchOSRMRoute(prev, pt);
            // Append new coords (skip first point — it overlaps with end of previous segment)
            const toAppend =
              routedCoords.length === 0 ? coords : coords.slice(1);
            routedCoords = routedCoords.concat(toAppend);
          } catch (err) {
            console.warn(
              "OSRM routing failed, falling back to straight line:",
              err,
            );
            // Fallback: straight line between the two points
            if (routedCoords.length === 0) routedCoords.push(prev);
            routedCoords.push(pt);
          } finally {
            setRoutingBusy(false);
          }

          // Redraw preview polyline with routed coords
          if (tempPolyline) map.removeLayer(tempPolyline);
          tempPolyline = L.polyline(routedCoords, {
            color: "#7efff5",
            weight: 4,
            opacity: 0.75,
            dashArray: "8 4",
          }).addTo(map);
        } else {
          // First point — just seed routedCoords so the next segment has a start
          routedCoords = [pt];
        }

        document.getElementById("btn-next-step").disabled =
          drawingPoints.length < 2 || isRouting;
        updateWaypointDots();
      }

      async function fetchOSRMRoute(from, to) {
        // OSRM expects lon,lat order
        const url = `https://routing.openstreetmap.de/routed-bike/route/v1/driving/${from[1]},${from[0]};${to[1]},${to[0]}?overview=full&geometries=geojson`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`OSRM HTTP ${res.status}`);
        const data = await res.json();
        if (data.code !== "Ok" || !data.routes.length)
          throw new Error("No route found");
        // GeoJSON coordinates are [lon, lat] — convert to [lat, lon] for Leaflet
        return data.routes[0].geometry.coordinates.map(([lon, lat]) => [
          lat,
          lon,
        ]);
      }

      function setRoutingBusy(busy) {
        isRouting = busy;
        const indicator = document.getElementById("drawing-indicator");
        indicator.textContent = busy
          ? "⏳ Snapping to road…"
          : "🛼 Click to place waypoints — min 2 required";
        document.getElementById("btn-next-step").disabled =
          busy || drawingPoints.length < 2;
      }

      function updateWaypointDots() {
        const c = document.getElementById("waypoint-counter");
        const n = Math.max(drawingPoints.length, 2);
        c.innerHTML = "";
        for (let i = 0; i < n; i++) {
          c.innerHTML += `<div class="wp-dot ${i < drawingPoints.length ? "placed" : ""}"></div>`;
        }
      }

      function clearDrawing() {
        drawingPoints = [];
        routedCoords = [];
        tempMarkers.forEach((m) => map.removeLayer(m));
        tempMarkers = [];
        if (tempPolyline) {
          map.removeLayer(tempPolyline);
          tempPolyline = null;
        }
      }

      // ─── Star picker ───────────────────────────────────────────────
      function renderStarPicker() {
        const picker = document.getElementById("star-picker");
        picker.innerHTML = "";
        RATINGS.forEach((info) => {
          const el = document.createElement("div");
          el.className = `star-opt${selectedRating === info.r ? " selected" : ""}`;
          el.dataset.r = info.r;
          el.innerHTML = `
      <span class="star-opt-icon">${info.emoji}</span>
      <div>${"★".repeat(info.r)}</div>
      <div class="star-opt-label">${info.label}</div>`;
          el.style.setProperty("--c", info.color);
          el.onclick = () => {
            selectedRating = info.r;
            renderStarPicker();
            checkSaveReady();
          };
          picker.appendChild(el);
        });
      }

      function checkSaveReady() {
        document.getElementById("btn-save").disabled = selectedRating === null;
      }

      // ─── Save ──────────────────────────────────────────────────────
      function saveSegment() {
        if (!selectedRating || routedCoords.length < 2) return;

        const seg = {
          id: crypto.randomUUID(),
          name: document.getElementById("seg-name-input").value.trim(),
          rating: selectedRating,
          points: routedCoords.slice(), // road-snapped coordinates
          created: Date.now(),
        };

        segments.push(seg);
        saveSegments();
        clearDrawing();
        renderAllSegments();
        startEditSession(); // ready for next segment
      }

      // ─── Delete ────────────────────────────────────────────────────
      function deleteSegment(id, e) {
        if (e) e.stopPropagation();
        if (!confirm("Delete this segment?")) return;
        segments = segments.filter((s) => s.id !== id);
        if (activeSegmentId === id) activeSegmentId = null;
        saveSegments();
        renderAllSegments();
        // close popup if open
        map.closePopup();
      }

      // ─── Location ──────────────────────────────────────────────────
      function centerOnMe() {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 16);
          },
          () => alert("Could not get location."),
        );
      }

      // ─── Persist ───────────────────────────────────────────────────
      function saveSegments() {
        localStorage.setItem("skatemap_segments", JSON.stringify(segments));
      }

      function loadSegments() {
        try {
          return JSON.parse(localStorage.getItem("skatemap_segments")) || [];
        } catch {
          return [];
        }
      }

      // ─── Init ──────────────────────────────────────────────────────
      function init() {
        renderAllSegments();
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 14);
          },
          () => {},
        );
      }
    </script>
  </body>
</html>
