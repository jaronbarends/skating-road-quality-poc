<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkateMap — Road Surface Ratings</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="logo">Skate<span>Map</span></div>

      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-view" onclick="setMode('view')">
          View
        </button>
        <button class="mode-btn" id="btn-edit" onclick="setMode('edit')">
          Edit
        </button>
      </div>

      <button
        class="btn-icon"
        title="Center on my location"
        onclick="centerOnMe()"
      >
        ◎
      </button>
    </header>

    <div class="app-body">
      <div id="map"></div>

      <aside class="sidebar">
        <!-- Legend / filter -->
        <div class="sidebar-section">
          <div class="sidebar-label">Surface rating</div>
          <div class="legend-items" id="legend"></div>
        </div>

        <!-- Stats -->
        <div class="sidebar-section">
          <div class="sidebar-label">Overview</div>
          <div class="stats-grid">
            <div class="stat-box">
              <div class="stat-val" id="stat-total">0</div>
              <div class="stat-key">Segments</div>
            </div>
            <div class="stat-box">
              <div class="stat-val" id="stat-avg">—</div>
              <div class="stat-key">Avg rating</div>
            </div>
          </div>
        </div>

        <!-- Segments list -->
        <div class="sidebar-label" style="padding: 12px 16px 4px; margin: 0">
          Segments
        </div>
        <div class="segments-list" id="segments-list"></div>
      </aside>
    </div>

    <!-- Edit panel -->
    <div class="edit-panel" id="edit-panel">
      <div class="edit-title">
        <span>➕ Add Segment</span>
        <span class="edit-step" id="edit-step-label">step 1 of 3</span>
      </div>

      <div id="edit-step1">
        <div class="edit-hint">
          Click on the map to place waypoints along the road segment. Click at
          least 2 points, then proceed.
        </div>
        <div class="waypoint-counter" id="waypoint-counter"></div>
        <div class="edit-actions">
          <button
            class="btn-primary"
            id="btn-next-step"
            onclick="goToStep2()"
            disabled
          >
            Next →
          </button>
          <button class="btn-secondary" onclick="clearDrawing()">Cancel</button>
        </div>
      </div>

      <div id="edit-step2" style="display: none">
        <div class="field-label">Segment name (optional)</div>
        <input
          class="name-input"
          id="seg-name-input"
          type="text"
          placeholder="e.g. Stationsweg, Park path..."
        />

        <div class="field-label">Surface quality</div>
        <div class="star-picker" id="star-picker"></div>

        <div class="edit-actions">
          <button
            class="btn-primary"
            id="btn-save"
            onclick="saveSegment()"
            disabled
          >
            Save segment
          </button>
          <button class="btn-secondary" onclick="goToStep1()">← Back</button>
        </div>
      </div>
    </div>

    <div class="drawing-indicator" id="drawing-indicator">
      🛼 Click to place waypoints — min 2 required
    </div>
    <script src="main.js"></script>
  </body>
</html>
